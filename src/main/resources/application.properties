spring.application.name=social-spring
server.port=8000

#server.servlet.context-path=/api/v1

# mongodb
spring.mongodb.host=localhost
spring.mongodb.port=27017
spring.mongodb.database=social
logging.level.org.springframework.data.mongodb.core.MongoTemplate = DEBUG

# postgres
spring.datasource.url=jdbc:postgresql://localhost:5432/social
spring.datasource.username=
spring.datasource.password=

# hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# jwt
jwt.access_token_secret =
jwt.refresh_token_secret =